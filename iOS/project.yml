name: TrashDayLog
options:
  bundleIdPrefix: com.shimondeitel.trashdaylog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  TrashDayLog:
    type: application
    platform: iOS
    sources:
      - path: TrashDayLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.trashdaylog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: TrashDayLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TrashDayLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TrashDayLogTests
      - path: TrashDayLog.storekit
    dependencies:
      - target: TrashDayLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.trashdaylog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TrashDayLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TrashDayLogUITests
    dependencies:
      - target: TrashDayLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.trashdaylog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  TrashDayLog:
    build:
      targets:
        TrashDayLog: all
        TrashDayLogTests: [test]
        TrashDayLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: TrashDayLog.storekit
    test:
      config: Debug
      storeKitConfiguration: TrashDayLog.storekit
      targets:
        - TrashDayLogTests
        - TrashDayLogUITests
    archive:
      config: Release
